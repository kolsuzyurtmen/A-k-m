<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yakup & İlayda | Sonsuz Aşk</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #c9184a;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #fff0f3;
            background: linear-gradient(180deg, #fff0f3 0%, #ffccd5 100%);
            color: #590d22;
            overflow-x: hidden;
        }

        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: transform 0.8s ease-in-out;
            color: white; text-align: center; padding: 20px;
        }

        #enter-btn {
            margin-top: 25px; padding: 15px 40px;
            border: none; background: white;
            color: var(--secondary); font-size: 1.1rem; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            padding: 20px 20px 120px 20px;
            text-align: center;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            color: var(--secondary);
            margin-top: 40px;
            margin-bottom: 10px;
        }

        #timer {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px; width: 100%; max-width: 400px;
            margin: 20px auto;
        }

        .time-box {
            background: var(--glass);
            backdrop-filter: blur(5px);
            padding: 15px 5px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.1);
            border: 1px solid white;
        }

        .time-box span { display: block; font-size: 1.8rem; font-weight: 600; color: var(--primary); }
        .time-box label { font-size: 0.7rem; color: #a4133c; font-weight: 600; }

        .footer-text {
            margin-top: 30px;
            font-family: 'Dancing Script';
            font-size: 1.5rem;
            color: var(--secondary);
            line-height: 1.4;
            padding: 0 10px;
        }

        #youtube-player { position: absolute; top: -500px; left: 0; width: 1px; height: 1px; }

        .particle { position: absolute; pointer-events: none; z-index: -1; animation: floatUp linear infinite; }
        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="youtube-player"></div>

    <div id="intro-screen">
        <h1 style="font-family: 'Great Vibes'; font-size: 3.5rem; margin: 0;">Yakup & İlayda</h1>
        <p>"Bana ellerini ver..."</p>
        <button id="enter-btn">Müziği Başlat ❤️</button>
    </div>

    <div class="main-content" id="main-content">
        <div class="names">Yakup & İlayda</div>
        <div style="font-weight: 600; color: var(--secondary); letter-spacing: 1px; margin-bottom: 20px;">31 EKİM 2025</div>
        
        <div id="timer">
            <div class="time-box"><span id="years">0</span><label>YIL</label></div>
            <div class="time-box"><span id="months">0</span><label>AY</label></div>
            <div class="time-box"><span id="days">0</span><label>GÜN</label></div>
            <div class="time-box"><span id="hours">0</span><label>SAAT</label></div>
            <div class="time-box"><span id="minutes">0</span><label>DAKİKA</label></div>
            <div class="time-box"><span id="seconds">0</span><label>SANİYE</label></div>
        </div>

        <div class="footer-text">
            "Seninle geçen her saniye bir hazine..."
        </div>
    </div>

    <script>
        var player;
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                videoId: 'gRjsXfD6ivo',
                playerVars: { 
                    'autoplay': 0, 
                    'controls': 0, 
                    'playsinline': 1, 
                    'loop': 1, 
                    'playlist': 'gRjsXfD6ivo' 
                }
            });
        }

        document.getElementById('enter-btn').addEventListener('click', function() {
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
                player.unMute();
            }
            document.getElementById('intro-screen').style.transform = 'translateY(-100%)';
            const main = document.getElementById('main-content');
            main.style.display = 'flex';
            
            setTimeout(() => {
                window.scrollTo(0, 0);
                setInterval(createParticle, 400);
            }, 100);
        });

        // HASSAS ZAMAN HESAPLAMA FONKSİYONU
        const startDate = new Date("2025-10-31T21:00:00");

        function updateTimer() {
            const now = new Date();
            
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();
            let hours = now.getHours() - startDate.getHours();
            let minutes = now.getMinutes() - startDate.getMinutes();
            let seconds = now.getSeconds() - startDate.getSeconds();

            // Saniye düzenleme
            if (seconds < 0) { seconds += 60; minutes--; }
            // Dakika düzenleme
            if (minutes < 0) { minutes += 60; hours--; }
            // Saat düzenleme
            if (hours < 0) { hours += 24; days--; }
            // Gün düzenleme
            if (days < 0) {
                // Bir önceki ayın kaç gün çektiğini bul
                let prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                days += prevMonth;
                months--;
            }
            // Ay düzenleme
            if (months < 0) {
                months += 12;
                years--;
            }

            document.getElementById("years").innerText = years;
            document.getElementById("months").innerText = months;
            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function createParticle() {
            const p = document.createElement("div");
            p.classList.add("particle");
            p.innerHTML = "❤️";
            p.style.left = Math.random() * 100 + "vw";
            p.style.fontSize = (Math.random() * 10 + 15) + "px";
            p.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
    </script>
</body>
</html>
