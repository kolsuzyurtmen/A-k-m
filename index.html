<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yakup & İlayda | Sonsuz Aşk</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #c9184a;
            /* Glow efekti için daha net bir cam efekti */
            --glass: rgba(255, 255, 255, 0.75); 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            background-attachment: fixed;
            color: #590d22;
            overflow-x: hidden;
        }

        #yt-wrap { position: fixed; top: -5000px; left: -5000px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        #intro-screen {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: opacity 0.8s ease;
            color: white; text-align: center;
        }

        #enter-btn {
            margin-top: 25px; padding: 15px 50px;
            border: none; background: white;
            color: var(--secondary); font-size: 1.1rem; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10; /* İçerik önde */
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 15vw, 6rem);
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .date-badge {
            background: var(--secondary);
            color: white;
            padding: 6px 22px;
            border-radius: 25px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        #timer {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 400px;
        }

        /* --- SAYAÇ KUTULARINA GLOW EFEKTİ --- */
        .time-box {
            background: var(--glass);
            backdrop-filter: blur(15px); /* Cam efekti derinleşti */
            padding: 22px 10px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.7); /* Kenarlık belirginleşti */
            
            /* Temel Glow Efekti (İç ve Dış Parlama) */
            box-shadow: 
                0 10px 30px rgba(255, 77, 109, 0.25),   /* Dış, yumuşak pembe parlama */
                0 0 20px rgba(201, 24, 74, 0.15),       /* Dış, daha koyu kırmızı glow */
                inset 0 0 15px rgba(255, 255, 255, 0.5), /* İç, beyaz aydınlatma */
                inset 0 0 5px rgba(201, 24, 74, 0.1);    /* İç, hafif kırmızı derinlik */
                
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;

            /* Nabız gibi hafifçe parlayıp sönme animasyonu */
            animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 10px 30px rgba(255, 77, 109, 0.25), 0 0 20px rgba(201, 24, 74, 0.15), inset 0 0 15px rgba(255, 255, 255, 0.5); }
            50% { box-shadow: 0 10px 40px rgba(255, 77, 109, 0.4), 0 0 30px rgba(201, 24, 74, 0.25), inset 0 0 20px rgba(255, 255, 255, 0.6); }
            100% { box-shadow: 0 10px 30px rgba(255, 77, 109, 0.25), 0 0 20px rgba(201, 24, 74, 0.15), inset 0 0 15px rgba(255, 255, 255, 0.5); }
        }

        .time-box span { display: block; font-size: 2.6rem; font-weight: 700; color: var(--secondary); line-height: 1; }
        .time-box label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #a4133c; }

        .footer-text {
            margin-top: 50px;
            font-family: 'Dancing Script';
            font-size: 1.8rem;
            color: var(--secondary);
        }

        /* ARKA PLANDA AKAN YAĞMUR */
        .particle { 
            position: fixed; 
            top: -60px; 
            pointer-events: none; 
            z-index: 1; /* İçeriğin arkasında */
            animation: fallDown linear forwards; 
        }

        @keyframes fallDown {
            0% { transform: translateY(0vh) rotate(0deg); opacity: 0; }
            10% { opacity: var(--p-op, 0.4); } 
            90% { opacity: var(--p-op, 0.4); }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="yt-wrap"><div id="youtube-player"></div></div>

    <div id="intro-screen">
        <h1 style="font-family: 'Great Vibes'; font-size: 4rem; margin: 0;">Yakup & İlayda</h1>
        <p>Aşkımızın Zaman Çizelgesi</p>
        <button id="enter-btn">Bölüm Aşk 🤍</button>
    </div>

    <div class="main-content" id="main-content">
        <div class="names">Yakup & İlayda</div>
        <div class="date-badge">31 EKİM 2025</div>
        <div id="timer">
            <div class="time-box"><span id="years">0</span><label>Yıl</label></div>
            <div class="time-box"><span id="months">0</span><label>Ay</label></div>
            <div class="time-box"><span id="days">0</span><label>Gün</label></div>
            <div class="time-box"><span id="hours">0</span><label>Saat</label></div>
            <div class="time-box"><span id="minutes">0</span><label>Dakika</label></div>
            <div class="time-box"><span id="seconds">0</span><label>Saniye</label></div>
        </div>
        <div class="footer-text">"Seninle geçen her saniye bir ömür..."</div>
    </div>

    <script>
        var player;
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                videoId: 'gRjsXfD6ivo',
                playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1, 'loop': 1, 'playlist': 'gRjsXfD6ivo' }
            });
        }

        document.getElementById('enter-btn').addEventListener('click', function() {
            if (player && player.playVideo) { player.playVideo(); player.unMute(); }
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                setInterval(createParticle, 350);
            }, 800);
        });

        const start = new Date(2025, 9, 31, 21, 0, 0); 

        function updateTimer() {
            const now = new Date();
            let years = now.getFullYear() - start.getFullYear();
            let months = now.getMonth() - start.getMonth();
            let days = now.getDate() - start.getDate();
            let hours = now.getHours() - start.getHours();
            let minutes = now.getMinutes() - start.getMinutes();
            let seconds = now.getSeconds() - start.getSeconds();

            if (seconds < 0) { seconds += 60; minutes--; }
            if (minutes < 0) { minutes += 60; hours--; }
            if (hours < 0) { hours += 24; days--; }
            if (days < 0) { months--; days = now.getDate(); }
            if (months < 0) { months += 12; years--; }
            
            document.getElementById("years").innerText = Math.max(0, years);
            document.getElementById("months").innerText = Math.max(0, months);
            document.getElementById("days").innerText = Math.max(0, days);
            document.getElementById("hours").innerText = Math.max(0, hours);
            document.getElementById("minutes").innerText = Math.max(0, minutes);
            document.getElementById("seconds").innerText = Math.max(0, seconds);
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function createParticle() {
            const p = document.createElement("div");
            p.classList.add("particle");
            
            const items = ["Y", "İ", "❤️", "💖", "✨", "🤍"];
            const selected = items[Math.floor(Math.random() * items.length)];
            p.innerHTML = selected;
            p.style.left = Math.random() * 100 + "vw";
            
            if(selected === "Y" || selected === "İ") {
                // Harfler için daha okunaklı ve kalın font
                p.style.fontFamily = "'Dancing Script', cursive";
                p.style.fontWeight = "bold";
                p.style.fontSize = (Math.random() * 10 + 25) + "px";
                p.style.color = "var(--secondary)";
                p.style.setProperty('--p-op', '0.6'); // Harfler biraz daha belirgin
            } else {
                p.style.fontSize = (Math.random() * 15 + 15) + "px";
                p.style.setProperty('--p-op', '0.3'); // Kalpler daha saydam
            }

            const duration = (Math.random() * 4 + 6);
            p.style.animationDuration = duration + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), duration * 1000);
        }
    </script>
</body>
</html>
